name: Deploy PlainPlan to AWS

on:
  push:
    branches:
      - main
      - master
    paths:
      - "python_service/**"
      - "public/**"
      - "test-fixtures/**"
      - "terraform/**"
      - "requirements-python.txt"
      - "scripts/**"
      - ".github/workflows/deploy-aws.yml"
  workflow_dispatch:

concurrency:
  group: plainplan-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID || secrets.AWS_IAM_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY || secrets.AWS_IAM_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Write deploy config
        shell: bash
        run: |
          cat > .env <<'ENVBLOCK'
          AWS_REGION=${{ secrets.AWS_REGION }}
          PROJECT_NAME=${{ vars.PROJECT_NAME || 'plainplan' }}
          ENVIRONMENT=${{ vars.ENVIRONMENT || 'dev' }}
          ENABLE_AURORA_SERVERLESS=${{ vars.ENABLE_AURORA_SERVERLESS || 'true' }}
          AURORA_DATABASE_NAME=${{ vars.AURORA_DATABASE_NAME || 'plainplan' }}
          AURORA_ENGINE_VERSION=${{ vars.AURORA_ENGINE_VERSION || '16.4' }}
          AURORA_MIN_CAPACITY=${{ vars.AURORA_MIN_CAPACITY || '0.5' }}
          AURORA_MAX_CAPACITY=${{ vars.AURORA_MAX_CAPACITY || '1' }}
          CUSTOM_DOMAIN_NAME=${{ vars.CUSTOM_DOMAIN_NAME || '' }}
          ACM_CERTIFICATE_ARN=${{ vars.ACM_CERTIFICATE_ARN || '' }}
          TF_STATE_BUCKET=${{ vars.TF_STATE_BUCKET || '' }}
          TF_STATE_REGION=${{ vars.TF_STATE_REGION || '' }}
          TF_STATE_KEY=${{ vars.TF_STATE_KEY || '' }}
          TF_LOCK_TABLE=${{ vars.TF_LOCK_TABLE || '' }}
          ENVBLOCK
          # Strip leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' .env

      - name: Build Python Lambda artifact
        shell: bash
        run: |
          chmod +x scripts/build_lambda_python.sh scripts/deploy_aws_dev.sh
          scripts/build_lambda_python.sh

      - name: Deploy infrastructure and app
        shell: bash
        run: |
          scripts/deploy_aws_dev.sh

      - name: Verify custom domain health
        shell: bash
        run: |
          set -e
          # shellcheck disable=SC1091
          source .env
          if [[ -n "${CUSTOM_DOMAIN_NAME:-}" ]]; then
            curl -fsS "https://${CUSTOM_DOMAIN_NAME}/health"
          else
            echo "No custom domain configured; skipping custom domain health check"
          fi
