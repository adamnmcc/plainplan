name: Deploy PlainPlan to AWS

on:
  push:
    branches:
      - main
      - master
    paths:
      - "python_service/**"
      - "public/**"
      - "test-fixtures/**"
      - "terraform/**"
      - "requirements-python.txt"
      - "scripts/**"
      - ".github/workflows/deploy-aws.yml"
  workflow_dispatch:

concurrency:
  group: plainplan-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID || secrets.AWS_IAM_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY || secrets.AWS_IAM_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build Python Lambda artifact
        run: |
          chmod +x scripts/build_lambda_python.sh
          scripts/build_lambda_python.sh

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config=dev.backend.hcl

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -var-file=dev.tfvars -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Bootstrap Aurora schema
        working-directory: terraform
        run: |
          ENABLE_AURORA=$(terraform output -raw enable_aurora_serverless 2>/dev/null || echo "false")
          if [[ "$ENABLE_AURORA" == "true" ]]; then
            python3 ../scripts/bootstrap_aurora_data_api.py \
              --cluster-arn "$(terraform output -raw aurora_cluster_arn)" \
              --secret-arn "$(terraform output -raw aurora_secret_arn)" \
              --database "$(terraform output -raw aurora_database_name)" \
              --schema-file ../schema/schema.sql \
              --region "${{ secrets.AWS_REGION }}"
          else
            echo "Aurora not enabled, skipping schema bootstrap"
          fi

      - name: Post-deploy smoke tests
        working-directory: terraform
        run: |
          set -euo pipefail
          API_URL="$(terraform output -raw api_invoke_url)"
          CUSTOM_URL="$(terraform output -raw custom_domain_target 2>/dev/null || true)"
          PASS=0; FAIL=0

          check() {
            local name="$1"; shift
            if "$@" > /tmp/test_out 2>&1; then
              echo "✅ $name"
              PASS=$((PASS + 1))
            else
              echo "❌ $name"
              cat /tmp/test_out
              FAIL=$((FAIL + 1))
            fi
          }

          # 1. Health check
          check "GET /health" \
            curl -fsS "$API_URL/health"

          # 2. API info endpoint
          check "GET /api returns endpoint list" \
            bash -c "curl -fsS '$API_URL/api' | python3 -c 'import sys,json; d=json.load(sys.stdin); assert \"endpoints\" in d'"

          # 3. Example plan endpoint
          check "GET /api/example returns sample plan" \
            bash -c "curl -fsS '$API_URL/api/example' | python3 -c 'import sys,json; d=json.load(sys.stdin); assert \"plan\" in d'"

          # 4. Key generation
          KEY_RESPONSE=$(curl -fsS -X POST "$API_URL/api/keys" \
            -H 'Content-Type: application/json' \
            -d '{"email":"smoke-test@plainplan.dev","name":"ci-smoke-test"}')
          API_KEY=$(echo "$KEY_RESPONSE" | python3 -c 'import sys,json; print(json.load(sys.stdin)["api_key"])')
          check "POST /api/keys creates key" \
            bash -c "echo '$KEY_RESPONSE' | python3 -c 'import sys,json; d=json.load(sys.stdin); assert d[\"success\"] and d[\"api_key\"].startswith(\"pp_live_\")'"

          # 5. Key verification
          check "GET /api/keys/verify validates key" \
            bash -c "curl -fsS '$API_URL/api/keys/verify' -H 'Authorization: Bearer $API_KEY' | python3 -c 'import sys,json; d=json.load(sys.stdin); assert d[\"valid\"]'"

          # 6. Analyze endpoint (with sample plan)
          SAMPLE_PLAN=$(curl -fsS "$API_URL/api/example" | python3 -c 'import sys,json; print(json.dumps(json.load(sys.stdin)["plan"]))')
          check "POST /api/analyze returns analysis" \
            bash -c "curl -fsS -X POST '$API_URL/api/analyze' -H 'Authorization: Bearer $API_KEY' -H 'Content-Type: application/json' -d '$SAMPLE_PLAN' | python3 -c 'import sys,json; d=json.load(sys.stdin); assert d.get(\"success\") or \"risk_level\" in d or \"error\" not in d, f\"Unexpected: {d}\"'"

          # 7. Reject unauthenticated analyze
          check "POST /api/analyze rejects missing auth" \
            bash -c "HTTP_CODE=\$(curl -s -o /dev/null -w '%{http_code}' -X POST '$API_URL/api/analyze' -H 'Content-Type: application/json' -d '{}'); [ \"\$HTTP_CODE\" = '401' ] || [ \"\$HTTP_CODE\" = '403' ]"

          # 8. Custom domain (if configured)
          if [[ -n "$CUSTOM_URL" && "$CUSTOM_URL" != "null" ]]; then
            check "Custom domain health check" \
              curl -fsS "$CUSTOM_URL/health"
          else
            echo "⏭️  Custom domain not configured, skipping"
          fi

          echo ""
          echo "Results: $PASS passed, $FAIL failed"
          [[ $FAIL -eq 0 ]] || exit 1
