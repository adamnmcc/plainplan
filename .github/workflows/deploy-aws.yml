name: Deploy PlainPlan to AWS

on:
  push:
    branches:
      - main
      - master
    paths:
      - "python_service/**"
      - "public/**"
      - "test-fixtures/**"
      - "terraform/**"
      - "requirements-python.txt"
      - "scripts/**"
      - ".github/workflows/deploy-aws.yml"
  workflow_dispatch:

concurrency:
  group: plainplan-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID || secrets.AWS_IAM_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY || secrets.AWS_IAM_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync deploy env from AWS
        shell: bash
        env:
          FALLBACK_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || secrets.OPENAI_API_KEY }}
          FALLBACK_OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL || secrets.OPENAI_BASE_URL }}
        run: |
          chmod +x scripts/sync_env_from_aws.sh
          scripts/sync_env_from_aws.sh \
            --prefix "${{ vars.AWS_CONFIG_PREFIX || secrets.AWS_CONFIG_PREFIX || 'plainplan/dev' }}" \
            --region "${{ secrets.AWS_REGION }}"

          # shellcheck disable=SC1091
          set -a
          source .env

          if [[ -z "${OPENROUTER_API_KEY:-}" && -n "${OPENAI_API_KEY:-}" ]]; then
            OPENROUTER_API_KEY="$OPENAI_API_KEY"
          fi

          if [[ -z "${OPENROUTER_API_KEY:-}" && -n "${FALLBACK_OPENROUTER_API_KEY:-}" ]]; then
            OPENROUTER_API_KEY="$FALLBACK_OPENROUTER_API_KEY"
          fi

          if [[ -z "${OPENROUTER_BASE_URL:-}" && -n "${OPENAI_BASE_URL:-}" ]]; then
            OPENROUTER_BASE_URL="$OPENAI_BASE_URL"
          fi

          if [[ -z "${OPENROUTER_BASE_URL:-}" && -n "${FALLBACK_OPENROUTER_BASE_URL:-}" ]]; then
            OPENROUTER_BASE_URL="$FALLBACK_OPENROUTER_BASE_URL"
          fi

          if [[ -z "${OPENROUTER_API_KEY:-}" ]]; then
            echo "::warning::OPENROUTER_API_KEY is empty. Lambda will deploy but AI analysis will fail until the secret is populated."
          fi

          set +a

          {
            echo "AWS_REGION=${{ secrets.AWS_REGION }}"
            echo "OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}"
            echo "OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}"
            echo "STATS_SECRET=${STATS_SECRET:-}"
            echo "PROJECT_NAME=${PROJECT_NAME:-plainplan}"
            echo "ENVIRONMENT=${ENVIRONMENT:-dev}"
            echo "ENABLE_AURORA_SERVERLESS=${ENABLE_AURORA_SERVERLESS:-true}"
            echo "AURORA_DATABASE_NAME=${AURORA_DATABASE_NAME:-plainplan}"
            echo "AURORA_ENGINE_VERSION=${AURORA_ENGINE_VERSION:-16.4}"
            echo "AURORA_MIN_CAPACITY=${AURORA_MIN_CAPACITY:-0.5}"
            echo "AURORA_MAX_CAPACITY=${AURORA_MAX_CAPACITY:-1}"
          } >> .env

      - name: Build Python Lambda artifact
        shell: bash
        run: |
          chmod +x scripts/build_lambda_python.sh scripts/deploy_aws_dev.sh
          scripts/build_lambda_python.sh

      - name: Deploy infrastructure and app
        shell: bash
        run: |
          scripts/deploy_aws_dev.sh

      - name: Verify custom domain health
        shell: bash
        run: |
          set -e
          # shellcheck disable=SC1091
          source .env
          if [[ -n "${CUSTOM_DOMAIN_NAME:-}" ]]; then
            curl -fsS "https://${CUSTOM_DOMAIN_NAME}/health"
          else
            echo "No custom domain configured; skipping custom domain health check"
          fi
